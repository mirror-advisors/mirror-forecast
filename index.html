<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mirror Forecast</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0B1120; font-family: 'IBM Plex Mono', monospace; }
      input[type=range]::-webkit-slider-thumb { appearance:none; width:12px; height:12px; border-radius:50%; background:#10B981; cursor:pointer; border:2px solid #0B1120; }
      input[type=range]::-moz-range-thumb { width:12px; height:12px; border-radius:50%; background:#10B981; cursor:pointer; border:2px solid #0B1120; }
      ::-webkit-scrollbar { width:5px; height:5px; }
      ::-webkit-scrollbar-track { background:#0B1120; }
      ::-webkit-scrollbar-thumb { background:#1E293B; border-radius:3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
