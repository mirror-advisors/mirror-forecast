<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mirror Forecast</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz@9..40;wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0f1419; font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }
      input[type=range]::-webkit-slider-thumb { appearance:none; width:14px; height:14px; border-radius:50%; background:#34d399; cursor:pointer; border:2px solid #0f1419; box-shadow: 0 0 8px rgba(52,211,153,0.3); }
      input[type=range]::-moz-range-thumb { width:14px; height:14px; border-radius:50%; background:#34d399; cursor:pointer; border:2px solid #0f1419; }
      ::-webkit-scrollbar { width:6px; height:6px; }
      ::-webkit-scrollbar-track { background:transparent; }
      ::-webkit-scrollbar-thumb { background:#2a3441; border-radius:3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
