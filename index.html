<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mirror Forecast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'DM Sans', sans-serif; background: #111318; }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px; height: 14px; border-radius: 50%;
        background: #4ade80; cursor: pointer; border: 2px solid #111318;
        box-shadow: 0 0 4px rgba(74,222,128,0.3);
      }
      input[type="range"]::-moz-range-thumb {
        width: 14px; height: 14px; border-radius: 50%;
        background: #4ade80; cursor: pointer; border: 2px solid #111318;
        box-shadow: 0 0 4px rgba(74,222,128,0.3);
      }
      ::selection { background: #4ade80; color: #111318; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #1a1d24; }
      ::-webkit-scrollbar-thumb { background: #2e3038; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #7a776e; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
